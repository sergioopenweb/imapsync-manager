{% extends "base.html" %}

{% block title %}Login - ImapSync Manager{% endblock %}

{% block content %}
{% if session.user_id %}
<script>window.location.href = "{{ url_for('dashboard') }}";</script>
{% else %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-envelope-arrow-down text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-3">ImapSync Manager</h3>
                    <p class="text-muted">Gerencie suas sincronizações de email</p>
                </div>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="text-muted">Não tem uma conta?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-person-plus"></i> Criar Conta
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %} 
{% endblock %}
